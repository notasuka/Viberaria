name: Build Viberaria tMod

env:
  TML_BUILD_PATH_OVERRIDE: ./bin
  GH_TOKEN: ${{ github.token }}
  BUILD_TXT: src/Viberaria/build.txt

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-bump patch version
        id: bump
        shell: powershell
        run: |
          $buildTxt = "${{ env.BUILD_TXT }}"
          if (-not (Test-Path $buildTxt)) { Write-Error "build.txt not found at $buildTxt"; exit 1 }

          $lines = Get-Content $buildTxt
          $updatedLines = @()
          $newVersion = $null

          foreach ($line in $lines) {
              if ($line -match '^version *= *(\d+)\.(\d+)\.(\d+)$') {
                  $major = [int]$matches[1]
                  $minor = [int]$matches[2]
                  $patch = [int]$matches[3] + 1
                  $newVersion = "$major.$minor.$patch"
                  $updatedLines += "version = $newVersion"
              } else {
                  $updatedLines += $line
              }
          }

          if (-not $newVersion) {
              Write-Host "No version line matched; skipping bump."
              Add-Content -Path $env:GITHUB_OUTPUT -Value "bumped=false"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "version="
              exit 0
          }

          $updatedLines | Set-Content $buildTxt

          Write-Host "New version: $newVersion"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$newVersion"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "bumped=true"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit the bumped build.txt BEFORE tagging
          git add "${{ env.BUILD_TXT }}"
          git commit -m "chore: bump version to $newVersion [skip ci]"
          git push origin HEAD:master

          $tag = "v$newVersion"
          if (-not (git tag --list $tag)) {
              git tag -a $tag -m "Release $tag"
              git push origin $tag
          } else {
              Write-Host "Tag already exists: $tag"
          }

      - name: Verify version output
        shell: bash
        run: |
          echo "bumped=${{ steps.bump.outputs.bumped }}"
          echo "version=${{ steps.bump.outputs.version }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Download tModLoader
        run: curl -s -L https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip -o tModLoader.zip

      - name: Extract tModLoader
        shell: bash
        run: |
          unzip -q -o tModLoader.zip -d ../tModLoader
          rm tModLoader.zip

      - name: Create tModLoader.targets file
        shell: bash
        run: |
          cat >> ../tModLoader.targets << 'EOF'
          <Project ToolsVersion="14.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <Import Project="tModLoader/tMLMod.targets" />
          </Project>
          EOF

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build Viberaria.sln --configuration Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: ./bin/tModLoader/Mods/Viberaria.tmod

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: release-artifact

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: release-artifact/*.tmod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
